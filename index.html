<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>NovaSelf Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 NovaSelf</h1>
      <p id="user-info"></p>
    </header>

    <div class="status-bar">
      <div id="status" class="status">🔴 خاموش</div>
      <button id="toggle-btn" class="toggle-btn">روشن کردن سلف</button>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="main">🏠 اصلی</button>
      <button class="tab" data-tab="time">⏰ ساعت</button>
      <button class="tab" data-tab="date">📅 تاریخ</button>
      <button class="tab" data-tab="action">🎭 اکشن</button>
      <button class="tab" data-tab="account">👤 حساب</button>
    </nav>

    <div id="main" class="tab-content active">
      <!-- محتوا با JS لود میشه -->
    </div>

    <div id="time" class="tab-content"></div>
    <div id="date" class="tab-content"></div>
    <div id="action" class="tab-content"></div>
    <div id="account" class="tab-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
